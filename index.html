<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>字词练习生成器</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #18202b;
      --muted: #657185;
      --line: #d9dee8;
      --line-strong: #9aa6ba;
      --blue: #2563eb;
      --blue-soft: #e8f0ff;
      --green: #15803d;
      --green-soft: #e8f7ed;
      --amber: #b45309;
      --amber-soft: #fff4dd;
      --red: #b91c1c;
      --shadow: 0 16px 45px rgba(24, 32, 43, .08);
      --radius: 8px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      --serif: "Songti SC", "SimSun", serif;
      --write-cell: 42px;
      --write-border: #6f6f6f;
      --write-inner: #a9a9a9;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: var(--font);
      line-height: 1.5;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
      min-height: 100vh;
    }

    .control {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
      padding: 24px;
      background: var(--panel);
      border-right: 1px solid var(--line);
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0;
    }

    .version {
      padding: 4px 8px;
      color: var(--green);
      background: var(--green-soft);
      border: 1px solid #bfe8cc;
      border-radius: 999px;
      font-size: 12px;
      white-space: nowrap;
    }

    .field {
      margin: 18px 0;
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field.is-hidden {
      display: none;
    }

    label,
    .label {
      display: block;
      margin-bottom: 8px;
      color: #273244;
      font-weight: 700;
      font-size: 14px;
    }

    textarea,
    input[type="text"],
    input[type="password"],
    input[type="number"],
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      outline: none;
      transition: border-color .15s ease, box-shadow .15s ease;
    }

    textarea {
      min-height: 220px;
      padding: 12px;
      resize: vertical;
      font-size: 14px;
    }

    input[type="text"],
    input[type="password"],
    input[type="number"],
    select {
      height: 40px;
      padding: 0 10px;
    }

    textarea:focus,
    input:focus,
    select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .14);
    }

    .config-panel {
      display: none;
      margin: 12px 0 18px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #f9fafc;
    }

    .config-panel.open {
      display: block;
    }

    .config-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .config-head h2 {
      margin: 0;
      font-size: 16px;
      letter-spacing: 0;
    }

    .config-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    .config-status {
      margin-top: 10px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--muted);
      background: #fff;
      font-size: 12px;
    }

    .config-status.ready {
      color: var(--green);
      background: var(--green-soft);
      border-color: #bfe8cc;
    }

    .config-status.warn {
      color: var(--amber);
      background: var(--amber-soft);
      border-color: #f0cc88;
    }

    .config-status.error {
      color: var(--red);
      background: #fff1f2;
      border-color: #fecdd3;
    }

    .hint {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .format {
      display: grid;
      gap: 6px;
      margin-top: 10px;
      padding: 12px;
      color: #344054;
      background: #f9fafc;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      font-size: 12px;
    }

    .format code {
      color: #0f3f86;
      white-space: normal;
    }

    .checks {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .check {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 38px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: #273244;
      font-size: 14px;
      user-select: none;
    }

    .check input {
      width: 16px;
      height: 16px;
      accent-color: var(--blue);
    }

    .check-name {
      flex: 1;
      min-width: 0;
    }

    .type-multiplier {
      width: 62px;
      min-height: 28px;
      padding: 2px 6px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--muted);
      font-size: 13px;
    }

    .type-multiplier:disabled {
      opacity: .45;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 14px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      font-weight: 700;
    }

    .button.primary {
      color: #fff;
      background: var(--blue);
    }

    .button.secondary {
      color: var(--ink);
      background: #fff;
      border-color: var(--line);
    }

    .button.print {
      color: #073b1d;
      background: var(--green-soft);
      border-color: #a9dfba;
    }

    .button.warning {
      color: #5f3300;
      background: var(--amber-soft);
      border-color: #f0cc88;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 16px;
    }

    .stat {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .stat b {
      display: block;
      font-size: 20px;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .preview-shell {
      padding: 24px;
      overflow: auto;
    }

    .preview-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      max-width: 900px;
      margin: 0 auto 16px;
      color: var(--muted);
      font-size: 13px;
    }

    .paper-stack {
      display: grid;
      gap: 22px;
      justify-content: center;
    }

    .sheet {
      width: 210mm;
      min-height: 297mm;
      padding: 15mm 15mm 14mm;
      background: #fff;
      border: 1px solid #e4e8f0;
      box-shadow: var(--shadow);
      color: #111827;
    }

    .worksheet-header {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 18px;
      padding-bottom: 12px;
      border-bottom: 2px solid #111827;
    }

    .worksheet-title {
      margin: 0;
      font-size: 28px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .worksheet-meta {
      display: grid;
      grid-template-columns: repeat(3, auto);
      gap: 14px;
      color: #344054;
      font-size: 13px;
      white-space: nowrap;
    }

    .meta-line {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .meta-line::after {
      content: "";
      display: inline-block;
      width: 56px;
      height: 1px;
      border-bottom: 1px solid #667085;
      transform: translateY(4px);
    }

    .print-section {
      margin-top: 24px;
      break-inside: avoid;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 14px;
      font-size: 17px;
      line-height: 1.25;
    }

    .section-title .num {
      display: inline-grid;
      place-items: center;
      width: 26px;
      height: 26px;
      color: #fff;
      background: #111827;
      border-radius: 999px;
      font-size: 13px;
    }

    .question-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px 24px;
    }

    .question {
      min-height: 42px;
      font-size: 15px;
    }

    .question.full {
      grid-column: 1 / -1;
    }

    .word-row {
      display: grid;
      grid-template-columns: 44px 1fr;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .word-label {
      color: #344054;
      font-size: 14px;
      font-weight: 700;
    }

    .square-grid {
      display: inline-grid;
      grid-auto-flow: column;
      grid-auto-columns: var(--write-cell);
      gap: 0;
      vertical-align: middle;
    }

    .square {
      position: relative;
      width: var(--write-cell);
      height: var(--write-cell);
      border: 1.5px solid var(--write-border);
      background: #fff;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .square + .square {
      border-left-width: 0;
    }

    .square::before,
    .practice-square::before,
    .copy-table td::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 0;
      border-left: 1px solid var(--write-inner);
      pointer-events: none;
    }

    .square::after,
    .practice-square::after,
    .copy-table td::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 0;
      border-top: 1px solid var(--write-inner);
      pointer-events: none;
    }

    .copy-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-family: var(--serif);
      font-size: 21px;
    }

    .copy-table td {
      position: relative;
      width: var(--write-cell);
      height: var(--write-cell);
      text-align: center;
      vertical-align: middle;
      border: 1.5px solid var(--write-border);
      background: #fff;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .copy-table .sample {
      color: #111827;
      font-weight: 700;
      background-color: #f9fafb;
    }

    .line-answer {
      display: inline-block;
      min-width: 72px;
      height: 1.2em;
      border-bottom: 1px solid #667085;
      transform: translateY(3px);
    }

    .long-line {
      display: block;
      height: 34px;
      border-bottom: 1px solid #98a2b3;
    }

    .choices {
      margin: 6px 0 0;
      color: #344054;
      font-size: 13px;
    }

    .word-bank {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 0 10px;
      padding: 10px;
      border: 1px solid #c9d3e4;
      background: #f8fbff;
      border-radius: var(--radius);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 3px 10px;
      border: 1px solid #b8c7df;
      border-radius: 999px;
      background: #fff;
      font-weight: 700;
    }

    .answer-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px 18px;
      margin: 0;
      padding-left: 20px;
      font-size: 14px;
    }

    .answer-list li {
      padding-left: 2px;
    }

    .answer-list.detailed {
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .answer-detail {
      break-inside: avoid;
    }

    .answer-head {
      margin-bottom: 5px;
      font-weight: 700;
    }

    .option-analysis-list {
      display: grid;
      gap: 3px;
      margin: 0;
      padding: 0;
      list-style: none;
      font-size: 13px;
      line-height: 1.55;
    }

    .option-analysis-list li {
      padding-left: 0;
    }

    .option-letter {
      display: inline-block;
      min-width: 20px;
      font-weight: 700;
    }

    .answer-note {
      color: #475467;
      font-size: 13px;
    }

    .practice-sheet {
      position: relative;
      padding: 18mm 15mm 10mm;
      font-family: var(--serif);
      color: #222;
    }

    .practice-sheet::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 19mm;
      background: #fff8c9;
      opacity: .64;
    }

    .booklet-header {
      position: relative;
      z-index: 1;
      display: block;
      min-height: 20mm;
      margin: 0 -4mm 6mm;
      padding: 1mm 4mm 2mm;
      border-bottom: 1px solid #e9dfaa;
    }

    .booklet-kicker {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: #8a6f36;
      font-family: var(--font);
      font-weight: 700;
      font-size: 12px;
    }

    .booklet-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
      height: auto;
      padding: 0;
      color: inherit;
      background: transparent;
      border-radius: 0;
      font-weight: 700;
    }

    .booklet-title {
      margin: 2mm 0 3mm;
      text-align: center;
      font-size: 23px;
      line-height: 1.15;
      letter-spacing: 2px;
      font-weight: 800;
    }

    .booklet-name-line {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      min-width: 80px;
    }

    .booklet-name-line::after {
      content: "";
      display: inline-block;
      width: 54px;
      border-bottom: 1px solid #9b8e65;
      transform: translateY(3px);
    }

    .booklet-section {
      position: relative;
      margin-top: 11mm;
      break-inside: avoid;
    }

    .booklet-section-title {
      margin: 0 0 6mm;
      font-size: 18px;
      line-height: 1.2;
      font-weight: 800;
    }

    .booklet-section-title .serial {
      margin-right: 3px;
    }

    .pronunciation-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4mm 9mm;
      font-size: 16px;
      line-height: 1.45;
    }

    .pronunciation-item {
      white-space: nowrap;
    }

    .dot-char {
      position: relative;
      display: inline-block;
      padding-bottom: .16em;
      text-emphasis: none;
      -webkit-text-emphasis: none;
    }

    .dot-char::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -.03em;
      width: .18em;
      height: .18em;
      border-radius: 50%;
      background: currentColor;
      transform: translateX(-50%);
    }

    .pinyin-card-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 9mm 12mm;
      justify-items: center;
      align-items: start;
    }

    .pinyin-card-grid.wide {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .pinyin-write-item {
      break-inside: avoid;
      display: flex;
      justify-content: center;
      width: 100%;
    }

    .write-box {
      display: inline-grid;
      grid-template-rows: 22px auto;
      row-gap: 3px;
      width: max-content;
    }

    .pinyin-row {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: var(--write-cell);
      align-items: end;
      justify-content: start;
      min-height: 22px;
      color: #5f6368;
      font-family: var(--font);
      font-size: 15px;
      font-weight: 600;
      line-height: 1.1;
      text-align: center;
    }

    .pinyin-row span {
      min-width: 0;
      overflow: visible;
      white-space: nowrap;
    }

    .practice-squares {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: var(--write-cell);
      justify-content: start;
      gap: 0;
    }

    .practice-square {
      position: relative;
      width: var(--write-cell);
      height: var(--write-cell);
      border: 1.5px solid var(--write-border);
      background: #fff;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .practice-square + .practice-square {
      border-left-width: 0;
    }

    .copy-practice-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7mm 13mm;
    }

    .copy-practice-row {
      break-inside: avoid;
      display: grid;
      grid-template-columns: 26px 1fr;
      align-items: center;
      column-gap: 7px;
      min-width: 0;
    }

    .copy-practice-cells {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: var(--write-cell);
      justify-content: start;
      gap: 0;
    }

    .practice-square.sample-char {
      display: inline-grid;
      place-items: center;
      color: #111827;
      background: #fafafa;
      font-family: var(--serif);
      font-size: 25px;
      font-weight: 800;
      line-height: 1;
    }

    .practice-square .sample-text {
      position: relative;
      z-index: 1;
    }

    .fill-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 9mm 14mm;
      font-size: 16px;
      line-height: 1.6;
    }

    .choice-question-list {
      display: grid;
      gap: 7mm;
      font-size: 16px;
      line-height: 1.6;
    }

    .choice-options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 2mm 9mm;
      margin-top: 2mm;
      color: #333;
      font-size: 15px;
    }

    .meaning-option {
      line-height: 1.9;
    }

    .context-question {
      margin-bottom: 9mm;
      font-size: 16px;
      line-height: 2.75;
    }

    .inline-write {
      display: inline-block;
      vertical-align: middle;
      margin: 0 7px;
      transform: translateY(9px);
    }

    .inline-write .pinyin-row {
      font-size: 14px;
    }

    .sentence-line {
      display: block;
      height: 30px;
      border-bottom: 1px solid #888;
    }

    .booklet-footer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      justify-content: center;
      gap: 14mm;
      min-height: 7mm;
      padding-top: 1mm;
      color: #c86f31;
      background: #fff8c9;
      font-family: var(--font);
      font-size: 11px;
    }

    .empty-state {
      display: grid;
      place-items: center;
      width: 210mm;
      min-height: 180mm;
      padding: 28px;
      color: var(--muted);
      background: #fff;
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      text-align: center;
    }

    @media (max-width: 1020px) {
      .app {
        grid-template-columns: 1fr;
      }

      .control {
        position: relative;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .sheet,
      .empty-state {
        width: min(100%, 210mm);
      }
    }

    @media (max-width: 640px) {
      .control,
      .preview-shell {
        padding: 16px;
      }

      .field-row,
      .checks,
      .actions,
      .stats {
        grid-template-columns: 1fr;
      }

      .worksheet-header,
      .worksheet-meta,
      .question-grid,
      .answer-list,
      .copy-practice-list {
        grid-template-columns: 1fr;
      }
    }

    @media print {
      @page {
        size: A4;
        margin: 0;
      }

      body {
        background: #fff;
      }

      .no-print {
        display: none !important;
      }

      .app,
      .preview-shell,
      .paper-stack {
        display: block;
        padding: 0;
        margin: 0;
        min-height: 0;
      }

      .sheet {
        width: 210mm;
        min-height: 297mm;
        margin: 0;
        padding: 15mm;
        border: 0;
        box-shadow: none;
        break-after: page;
      }

      .practice-sheet {
        padding: 18mm 15mm 10mm;
      }

      .practice-sheet .booklet-section {
        padding-top: 4mm;
      }

      .sheet:last-child {
        break-after: auto;
      }

      .print-section {
        break-inside: avoid;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="control no-print">
      <div class="brand">
        <h1>字词练习生成器</h1>
        <span class="version">统编版小学语文</span>
      </div>

      <div class="field">
        <label for="gradeSelect">年级</label>
        <select id="gradeSelect">
          <option value="一年级">一年级</option>
          <option value="二年级">二年级</option>
          <option value="三年级" selected>三年级</option>
          <option value="四年级">四年级</option>

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");

    function friendlyNetworkError(error) {
      const message = String(error?.message || error || "");
      if (/failed to fetch|networkerror|load failed|cancelled|canceled/i.test(message)) {
        return "无法连接本机生成服务。请确认 http://127.0.0.1:8797 仍在运行，刷新页面后再生成。";
      }
      return message || "请求本机生成服务失败。";

    async function fetchGenerate(payload) {
      const body = JSON.stringify(payload);
      let lastError = null;
      for (let attempt = 0; attempt < 3; attempt += 1) {
        try {
          if (attempt > 0) {
            els.status.textContent = `本机服务连接中断，正在重试 ${attempt + 1}/3...`;
          }
          return await fetch("/api/generate", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body
          });
        } catch (error) {
          lastError = error;
          if (attempt < 2) {
            await delay([800, 1600][attempt]);
          }
        }
      }
      throw new Error(friendlyNetworkError(lastError));
    }

      const saved = localStorage.getItem(configKey);

      try {

        const inferredProvider = (config.baseUrl || "").includes("deepseek.com") ? "deepseek" : (config.provider || "openai");
        els.apiProvider.value = inferredProvider;
        els.apiBaseUrl.value = config.baseUrl || "https://api.openai.com/v1";
        els.apiModel.value = config.model || "gpt-4.1-mini";
        els.apiKey.value = config.apiKey || "";
        els.allowInsecureTLS.checked = Boolean(config.allowInsecureTLS);
        els.requestTimeout.value = config.timeoutSeconds || 30;
        els.fastMode.checked = config.fastMode !== false;
        applyProviderPreset(false);

        setConfigStatus(`已加载：${els.apiModel.value.trim()} @ ${els.apiBaseUrl.value.trim()}`, "ready");

    function isCjkChar(char) {
      return /^[\u3400-\u9fff]$/.test(char);
    }

    function isCjkText(text) {
      return Array.from(text).every(isCjkChar);
    }

    function parseInput(text) {
      const entries = [];
      const lines = text.split(/\n+/);

      for (const line of lines) {
        const raw = line.trim();
        if (!raw) continue;

        if (raw.includes("|")) {
          const columns = raw.split("|").map(item => item.trim());
          const [term, pinyin = "", sentence = "", confusable = "", meaning = "", tag = ""] = columns;
          if (term) {
            entries.push({ term, pinyin, sentence, confusable, meaning, tag });
          }
          continue;
        }

        const tokens = raw.split(/[，,、;；\s]+/).map(item => item.trim()).filter(Boolean);
        for (const token of tokens) {
          const pair = token.split(/[\/／]/).map(item => item.trim()).filter(Boolean);
          if (pair.length > 1) {
            entries.push({ term: pair[0], confusable: pair.slice(1).join(" / "), pair });
          } else if (isCjkText(token)) {
            Array.from(token).forEach(char => entries.push({ term: char, sourceChar: char, kind: "char-input" }));
          } else {
            entries.push({ term: token });
          }
        }
      }

      const seen = new Set();
      return entries.filter(entry => {
        const key = `${entry.term}|${entry.sentence || ""}`;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function profileEntryFromWord(char, profile, wordData) {
      const [term, pinyin = "", sentence = "", wrong = "", meaning = ""] = wordData;
      return {
        term,
        pinyin,
        sentence,
        confusable: wrong || profile.confusables.join(" / "),
        meaning,
        sourceChar: char,
        kind: "word"
      };
    }

    function expandSingleChar(entry) {
      const char = entry.term;
      const profile = charProfiles[char];
      if (!profile) {
        return [{
          term: char,
          pinyin: "",
          sentence: "",
          confusable: "",
          meaning: "这个字暂时没有内置画像，先做书写、听写、组词和造句练习。",
          sourceChar: char,
          kind: "char",
          fallback: true
        }];
      }

      const charEntry = {
        term: char,
        pinyin: profile.pinyin,
        sentence: "",
        confusable: profile.confusables.join(" / "),
        meaning: profile.meaning,
        sourceChar: char,
        kind: "char"
      };
      return [charEntry, ...profile.words.map(word => profileEntryFromWord(char, profile, word))];
    }

    function expandInputEntries(entries) {
      const expanded = [];
      for (const entry of entries) {
        if (Array.from(entry.term).length === 1 && isCjkChar(entry.term)) {
          expanded.push(...expandSingleChar(entry));
        } else {
          expanded.push({ ...entry, sourceChar: entry.sourceChar || entry.term, kind: entry.kind || "manual" });
        }
      }

      const seen = new Set();
      return expanded.filter(entry => {
        const key = `${entry.term}|${entry.sentence || ""}|${entry.sourceChar || ""}`;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function countSourceChars(entries) {
      return new Set(entries.map(entry => entry.sourceChar || entry.term)).size;
    }

    function selectPracticeEntries(entries, count) {
      const baseChars = entries.filter(entry => entry.kind === "char");
      const words = entries.filter(entry => entry.kind !== "char");
      return [...baseChars, ...shuffle(words)].slice(0, Math.min(count, entries.length));
    }

    function shuffle(items) {
      const copy = [...items];
      for (let index = copy.length - 1; index > 0; index -= 1) {
        const target = Math.floor(Math.random() * (index + 1));
        [copy[index], copy[target]] = [copy[target], copy[index]];
      }
      return copy;
    }

    function take(items, count) {
      return items.slice(0, Math.max(0, count));
    }

    function visibleChars(text) {
      return Array.from(String(text || "").replace(/\s/g, ""));
    }

    function squaresFor(term, min = 2) {
      const count = Math.max(min, visibleChars(term).length);
      return `<span class="square-grid">${Array.from({ length: count }, () => `<span class="square"></span>`).join("")}</span>`;
    }

    function blankTermInSentence(sentence, term) {
      if (!sentence || !term) return "";
      const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      return sentence.replace(new RegExp(escaped, "g"), "____");
    }

    function choiceLine(words) {
      return `<div class="choices">备选：${words.map(word => `（${escapeHtml(word)}）`).join(" ")}</div>`;
    }

    function findBankPrompts(entries) {
      const termSet = new Set();
      entries.forEach(entry => {
        termSet.add(entry.term);
        if (entry.confusable) {
          entry.confusable.split(/[\/／,，、\s]+/).filter(Boolean).forEach(word => termSet.add(word));
        }
      });

      const prompts = [];
      const typos = [];
      for (const bank of pairBank) {
        if (bank.words.some(word => termSet.has(word))) {
          bank.prompts.forEach(prompt => prompts.push({ ...prompt, words: bank.words }));
          if (bank.typo) typos.push({ ...bank.typo, words: bank.words });
        }
      }
      return { prompts, typos };
    }

    function makeFillQuestions(entries, count) {
      const withSentence = entries
        .filter(entry => entry.kind !== "char" && entry.sentence && entry.sentence.includes(entry.term))
        .map(entry => ({
          prompt: blankTermInSentence(entry.sentence, entry.term),
          answer: entry.term,
          choices: []
        }));

      const questions = take(withSentence, count);
      const words = take(entries.filter(entry => entry.kind !== "char").map(entry => entry.term), Math.max(count, 6));
      questions.forEach(question => {
        question.choices = shuffle(Array.from(new Set([question.answer, ...words]))).slice(0, Math.min(8, Math.max(4, words.length)));
      });
      return questions;
    }

    function makeDiscriminationQuestions(entries, count) {
      const { prompts } = findBankPrompts(entries);
      const manual = entries
        .filter(entry => entry.kind !== "char" && entry.confusable && entry.sentence && entry.sentence.includes(entry.term))
        .map(entry => {
          const choices = Array.from(new Set([entry.term, ...entry.confusable.split(/[\/／,，、\s]+/).filter(Boolean)]));
          return {
            text: blankTermInSentence(entry.sentence, entry.term),
            answer: entry.term,
            reason: entry.meaning ? `意思：${entry.meaning}` : "结合句意和搭配判断。",
            words: choices
          };
        });

      return take([...manual, ...prompts], count);
    }

    function makeTypoQuestions(entries, count) {
      const { typos } = findBankPrompts(entries);
      return take(typos, count);
    }

    function makeCopyTable(entries, count) {
      const rows = take(entries, count).map(entry => {
        const chars = visibleChars(entry.term);
        const cells = [];
        chars.forEach(char => cells.push(`<td class="sample">${escapeHtml(char)}</td>`));
        const blanks = Math.max(8 - chars.length, chars.length * 2);
        Array.from({ length: blanks }, () => cells.push("<td></td>"));
        return `<tr>${cells.slice(0, 12).join("")}</tr>`;
      });
      return `<table class="copy-table"><tbody>${rows.join("")}</tbody></table>`;
    }

    function makeDictation(entries, count) {
      return take(entries, count).map((entry, index) => `
        <div class="word-row">
          <span class="word-label">${index + 1}.</span>
          <span>${squaresFor(entry.term)}</span>
        </div>
      `).join("");
    }

    function makePinyin(entries, count) {
      const usable = entries.filter(entry => entry.pinyin);
      return take(usable, count).map((entry, index) => `
        <div class="question">
          ${index + 1}. ${escapeHtml(entry.pinyin)} ${squaresFor(entry.term)}
        </div>
      `).join("");
    }

    function makeSentenceQuestions(entries, count) {
      const words = entries.filter(entry => entry.kind !== "char");
      const selected = take(words.length ? words : entries, count);
      const required = "写一句完整、通顺的话。";
      return selected.map((entry, index) => `
        <div class="question full">
          ${index + 1}. 用“${escapeHtml(entry.term)}”造句。<span class="answer-note">${required}</span>
          <span class="long-line"></span>
        </div>
      `).join("");
    }

    function makeSection(number, title, body) {
      if (!body) return "";
      return `
        <section class="print-section">
          <h2 class="section-title"><span class="num">${number}</span>${escapeHtml(title)}</h2>
          ${body}
        </section>
      `;
    }

    function sourceCharsFromEntries(entries) {
      return Array.from(new Set(entries
        .map(entry => entry.sourceChar || entry.term)
        .flatMap(term => Array.from(String(term || "")))
        .filter(isCjkChar)));
    }

    function apiQuestionCount(payload) {
      return (payload.sections || []).reduce((total, section) => total + (section.questions || []).length, 0);
    }

    function optionLetter(index) {
      return String.fromCharCode(65 + index);
    }

    function renderOptionList(options) {
      if (!Array.isArray(options) || !options.length) return "";
      return `
        <div class="choices">
          ${options.map((option, index) => `${optionLetter(index)}. ${escapeHtml(stripOptionPrefix(option))}`).join("　")}
        </div>
      `;
    }

    function chineseSerial(index) {
      return ["一", "二", "三", "四", "五", "六", "七", "八", "九", "十"][index] || `${index + 1}`;
    }

    function getQuestionWord(question) {
      return question.word || question.term || question.answerText || question.answerWord || question.targetWord || "";
    }

    function getQuestionPinyin(question) {
      return question.pinyin || question.reading || question.promptPinyin || question.answerPinyin || "";
    }

    function splitPinyin(pinyin) {
      return String(pinyin || "")
        .replace(/-/g, " ")
        .split(/\s+/)
        .map(item => item.trim())
        .filter(Boolean);
    }

    function getWriteCount(question) {
      const word = getQuestionWord(question);
      if (word && /[\u3400-\u9fff]/.test(word)) return visibleChars(word).length;
      const pinyinCount = splitPinyin(getQuestionPinyin(question)).length;
      if (pinyinCount) return pinyinCount;
      return Math.max(2, Number(question.charCount) || 2);
    }

    function renderPracticeSquares(count) {
      return `<span class="practice-squares">${Array.from({ length: Math.max(1, count) }, () => `<span class="practice-square"></span>`).join("")}</span>`;
    }

    function renderPinyinRow(pinyin, count) {
      const syllables = splitPinyin(pinyin);
      const cells = Array.from({ length: Math.max(count, syllables.length || 1) }, (_, index) => syllables[index] || "");
      return `<div class="pinyin-row">${cells.map(item => `<span>${escapeHtml(item)}</span>`).join("")}</div>`;
    }

    function renderPinyinBox(question) {
      const count = getWriteCount(question);
      return `
        <span class="inline-write">
          <span class="write-box">
            ${renderPinyinRow(getQuestionPinyin(question), count)}
            ${renderPracticeSquares(count)}
          </span>
        </span>
      `;
    }

    function renderBookletHeader(payload, options) {
      const meta = [options.grade].filter(Boolean).join(" · ");
      return `
        <header class="booklet-header">
          <div class="booklet-kicker">
            <span><span class="booklet-pill">字词专项</span>　${escapeHtml(meta)}　${escapeHtml(options.dateText || "")}</span>
            <span class="booklet-name-line">姓名</span>
          </div>
          <h1 class="booklet-title">${escapeHtml(payload.title || options.title)}</h1>
        </header>
      `;
    }

    function renderBookletFooter() {
      return `
        <footer class="booklet-footer">
          <span>建议用时: 10分钟</span>
          <span>实际用时: ____分钟</span>
          <span>自我评价: ☆☆☆</span>
        </footer>
      `;
    }

    function renderPronunciationQuestion(question) {
      const word = getQuestionWord(question) || question.stem || question.text || "";
      const target = question.char || question.targetChar || "";
      const displayWord = target && word.includes(target)
        ? word.replace(target, `<span class="dot-char">${escapeHtml(target)}</span>`)
        : escapeHtml(word);
      const options = Array.isArray(question.options) ? question.options : [];
      return `<div class="pronunciation-item">${displayWord}${options.length ? `（${options.map(item => escapeHtml(stripOptionPrefix(item))).join("　")}）` : ""}</div>`;
    }

    function renderPinyinWriteQuestion(question) {
      const count = getWriteCount(question);
      return `
        <div class="pinyin-write-item">
          <span class="write-box">
            ${renderPinyinRow(getQuestionPinyin(question), count)}
            ${renderPracticeSquares(count)}
          </span>
        </div>
      `;
    }

    function copyPracticeChar(question) {
      const value = question.char || question.targetChar || question.word || question.term || "";
      return Array.from(String(value || "")).find(isCjkChar) || "";
    }

    function renderCopyPracticeSection(questions) {
      const rows = [];
      const byChar = new Map();
      questions.forEach(question => {
        const char = copyPracticeChar(question);
        if (!char) return;
        if (!byChar.has(char)) {
          byChar.set(char, { char, copies: 0 });
          rows.push(byChar.get(char));
        }
        byChar.get(char).copies += 1;
      });

      return `
        <div class="copy-practice-list">
          ${rows.map((row, index) => `
            <div class="copy-practice-row">
              <span>${index + 1}.</span>
              <span class="copy-practice-cells">
                <span class="practice-square sample-char"><span class="sample-text">${escapeHtml(row.char)}</span></span>
                ${Array.from({ length: Math.max(1, row.copies) }, () => `<span class="practice-square"></span>`).join("")}
              </span>
            </div>
          `).join("")}
        </div>
      `;
    }

    function stripOptionPrefix(value) {
      return optionText(value).replace(/^(?:\s*[A-Ha-hＡ-Ｈａ-ｈ][\.\、．:：]\s*)+/, "").trim();
    }

    function optionText(value) {
      if (value && typeof value === "object") {
        if (Array.isArray(value.words)) return value.words.join(" ");
        return String(value.text || value.label || value.value || "");
      }
      return String(value || "");
    }

    function renderFillQuestion(question, index) {
      const stem = question.stem || question.prompt || question.sentence || question.text || "";
      const options = Array.isArray(question.options) ? question.options : [];
      return `
        <div>
          ${index + 1}. ${escapeHtml(stem)}
          ${options.length ? `<div class="choices">${options.map(item => `（${escapeHtml(stripOptionPrefix(item))}）`).join(" ")}</div>` : ""}
        </div>
      `;
    }

    function renderChoiceQuestion(question, index) {
      const stem = question.stem || question.prompt || question.sentence || question.text || "";
      const options = Array.isArray(question.options) ? question.options : [];
      return `
        <div>
          <div>${index + 1}. ${escapeHtml(stem)}</div>
          ${options.length ? `<div class="choice-options">${options.map((item, optionIndex) => `<span>${optionLetter(optionIndex)}. ${escapeHtml(stripOptionPrefix(item))}</span>`).join("")}</div>` : ""}
        </div>
      `;
    }

    function meaningWordsFromOption(option) {
      if (option && typeof option === "object" && Array.isArray(option.words)) {
        return option.words.map(word => String(word || "").trim()).filter(Boolean);
      }

      const text = stripOptionPrefix(option)
        .replace(/[（）()【】\[\]]/g, " ")
        .replace(/\s*[·•]\s*/g, " ")
        .replace(/\s+/g, " ")
        .trim();
      const rawWords = text
        .split(/[、，,；;\/／|\s]+/)
        .map(word => word.trim())
        .filter(Boolean);
      const words = [];

      for (let index = 0; index < rawWords.length; index += 1) {
        const current = rawWords[index];
        const next = rawWords[index + 1];
        if (/^[\u3400-\u9fff]$/.test(current) && /^[\u3400-\u9fff]$/.test(next || "")) {
          words.push(current + next);
          index += 1;
        } else {
          words.push(current);
        }
      }

      return words;
    }

    function areConfusableChars(left, right) {
      if (!left || !right) return false;
      if (left === right) return true;
      const leftProfile = charProfiles[left];
      const rightProfile = charProfiles[right];
      return Boolean(
        (leftProfile && leftProfile.confusables.includes(right)) ||
        (rightProfile && rightProfile.confusables.includes(left))
      );
    }

    function inferMeaningTargetChars(words, option, question) {
      const explicitTargets = option && typeof option === "object" && Array.isArray(option.targetChars)
        ? option.targetChars.map(char => String(char || "").trim()).filter(Boolean)
        : [];
      if (explicitTargets.length === words.length) {
        return explicitTargets;
      }

      const explicit = option && typeof option === "object"
        ? option.char || option.targetChar || option.keyChar
        : "";
      const questionTarget = question.targetChar || question.char || question.keyChar || "";
      const candidates = [explicit, questionTarget].filter(Boolean);
      for (const candidate of candidates) {
        if (words.every(word => word.includes(candidate))) return words.map(() => candidate);
      }

      const firstWordChars = Array.from(words[0] || "").filter(isCjkChar);
      const commonChar = firstWordChars.find(char => words.length > 1 && words.every(word => word.includes(char)));
      if (commonChar) return words.map(() => commonChar);

      if (words.length < 2) return [];

      const charLists = words.map(word => Array.from(word || "").filter(isCjkChar));
      for (const firstChar of charLists[0]) {
        const picked = [firstChar];
        let matched = true;
        for (let index = 1; index < charLists.length; index += 1) {
          const related = charLists[index].find(char => areConfusableChars(firstChar, char));
          if (!related) {
            matched = false;
            break;
          }
          picked.push(related);
        }
        if (matched) return picked;
      }

      return [];
    }

    function renderDottedWord(word, targetChar) {
      return Array.from(String(word || "")).map(char => {
        if (targetChar && char === targetChar) {
          return `<span class="dot-char">${escapeHtml(char)}</span>`;
        }
        return escapeHtml(char);
      }).join("");
    }

    function renderMeaningOption(option, question) {
      const words = meaningWordsFromOption(option);
      const targetChars = inferMeaningTargetChars(words, option, question);
      if (!words.length) {
        return escapeHtml(stripOptionPrefix(option));
      }
      if (targetChars.length !== words.length) {
        return words.map(word => escapeHtml(word)).join("　");
      }
      return words.map((word, index) => renderDottedWord(word, targetChars[index])).join("　");
    }

    function renderMeaningChoiceQuestion(question, index) {
      const stem = question.stem || question.prompt || question.sentence || question.text || "";
      const options = Array.isArray(question.options) ? question.options : [];
      return `
        <div>
          <div>${index + 1}. ${escapeHtml(stem)}</div>
          ${options.length ? `<div class="choice-options meaning-options">${options.map((item, optionIndex) => `<span class="meaning-option">${optionLetter(optionIndex)}. ${renderMeaningOption(item, question)}</span>`).join("")}</div>` : ""}
        </div>
      `;
    }

    function renderContextualPinyinQuestion(question, index) {
      const stem = question.stem || question.prompt || question.sentence || question.text || "";
      const placeholder = /(____+|_{2,}|（\s*）|\(\s*\)|\[　*\]|【　*】)/g;
      const raw = String(stem);
      let lastIndex = 0;
      let inserted = false;
      let html = "";
      let match;

      while ((match = placeholder.exec(raw))) {
        html += escapeHtml(raw.slice(lastIndex, match.index));
        if (!inserted) {
          html += renderPinyinBox(question);
          inserted = true;
        } else {
          html += escapeHtml(match[0]);
        }
        lastIndex = match.index + match[0].length;
      }

      html += escapeHtml(raw.slice(lastIndex));
      if (!inserted) {
        html += ` ${renderPinyinBox(question)}`;
      }

      return `<div class="context-question">${index + 1}. ${html}</div>`;
    }

    function renderSentenceQuestion(question, index) {
      const word = getQuestionWord(question) || question.stem || "";
      return `
        <div class="context-question">
          ${index + 1}. 用“${escapeHtml(word)}”组词并造句。
          <span class="sentence-line"></span>
        </div>
      `;
    }

    function renderApiSectionBody(section) {
      const questions = section.questions || [];
      if (section.type === "copyPractice") {
        return renderCopyPracticeSection(questions);
      }
      if (section.type === "pronunciationChoice") {
        return `<div class="pronunciation-grid">${questions.map(renderPronunciationQuestion).join("")}</div>`;
      }
      if (section.type === "pinyinWriteWord") {
        return `<div class="pinyin-card-grid">${questions.map(renderPinyinWriteQuestion).join("")}</div>`;
      }
      if (section.type === "confusingCharFill") {
        return `<div class="fill-grid">${questions.map(renderFillQuestion).join("")}</div>`;
      }
      if (section.type === "contextualPinyinWrite") {
        return `<div>${questions.map(renderContextualPinyinQuestion).join("")}</div>`;
      }
      if (section.type === "wordSentence") {
        return `<div>${questions.map(renderSentenceQuestion).join("")}</div>`;
      }
      if (section.type === "meaningSameChoice") {
        return `<div class="choice-question-list">${questions.map(renderMeaningChoiceQuestion).join("")}</div>`;
      }
      return `<div class="choice-question-list">${questions.map(renderChoiceQuestion).join("")}</div>`;
    }

    function renderApiSection(section, index) {
      const instruction = section.instruction ? `<p class="answer-note">${escapeHtml(section.instruction)}</p>` : "";
      return `
        <section class="booklet-section">
          <h2 class="booklet-section-title"><span class="serial">${chineseSerial(index)}、</span>${escapeHtml(section.title || apiTypeLabels[section.type] || `第 ${index + 1} 题`)}</h2>
          ${instruction}
          ${renderApiSectionBody(section)}
        </section>
      `;
    }

    function renderApiQuestion(question, index, sectionType) {
      const stem = question.stem || question.prompt || question.sentence || question.text || "";
      const lead = question.word || question.term ? `（${escapeHtml(question.word || question.term)}）` : "";
      const options = Array.isArray(question.options) ? question.options : [];
      const needsLine = !options.length || sectionType === "wordSentence" || sectionType === "pinyinWriteWord" || sectionType === "contextualPinyinWrite";
      return `
        <div class="question full">
          ${index + 1}. ${lead}${escapeHtml(stem)}
          ${renderOptionList(options)}
          ${needsLine ? `<span class="long-line"></span>` : ""}
        </div>
      `;
    }

    function makeApiWorksheet(payload, options) {
      const sections = (payload.sections || []).map(renderApiSection);

      return `
        <article class="sheet practice-sheet">
          ${renderBookletHeader(payload, options)}
          ${sections.join("")}
          ${renderBookletFooter()}
        </article>
      `;
    }

    function answerTextFromQuestion(question) {
      if (question.answerText) return question.answerText;
      if (question.answer && Array.isArray(question.options) && /^[A-Z]$/.test(question.answer)) {
        const index = question.answer.charCodeAt(0) - 65;
        return stripOptionPrefix(question.options[index]) || question.answer;
      }
      return stripOptionPrefix(question.answer) || "";
    }

    function answerItemForQuestion(answerItems, question, index) {
      if (!Array.isArray(answerItems)) return null;
      return answerItems.find(item => item && question.id && item.id === question.id)
        || answerItems[index]
        || null;
    }

    function optionReasonSource(container, optionIndex) {
      if (!container || typeof container !== "object") return "";
      const fields = [
        container.optionExplanations,
        container.optionReasons,
        container.optionAnalysis,
        container.explanations,
        container.reasons
      ];
      const letter = optionLetter(optionIndex);

      for (const field of fields) {
        if (!field) continue;
        let value = "";
        if (Array.isArray(field)) {
          value = field[optionIndex];
        } else if (typeof field === "object") {
          value = field[letter] ?? field[letter.toLowerCase()] ?? field[optionIndex] ?? field[String(optionIndex)];
        }
        if (value && typeof value === "object") {
          value = value.explanation || value.reason || value.analysis || value.text || "";
        }
        if (value) return String(value);
      }

      return "";
    }

    function optionOwnReason(option) {
      if (!option || typeof option !== "object") return "";
      return String(option.explanation || option.reason || option.analysis || option.textReason || "");
    }

    function meaningOptionFallbackReason(option, question, optionIndex, answerLetter) {
      const same = option && typeof option === "object" ? option.sameMeaning ?? option.same ?? option.isSameMeaning : undefined;
      if (typeof same === "boolean") {
        return same ? "加点字意思相同。" : "加点字意思不同。";
      }
      return optionLetter(optionIndex) === answerLetter ? "加点字意思相同。" : "加点字意思不同。";
    }

    function meaningOptionReason(option, question, answerItem, optionIndex, answerLetter) {
      return optionOwnReason(option)
        || optionReasonSource(question, optionIndex)
        || optionReasonSource(answerItem, optionIndex)
        || meaningOptionFallbackReason(option, question, optionIndex, answerLetter);
    }

    function renderMeaningAnswerBody(section, answerItems) {
      const questions = section.questions || [];
      const items = questions.map((question, index) => {
        const answerItem = answerItemForQuestion(answerItems, question, index) || {};
        const answerLetter = String(answerItem.answer || question.answer || "").trim().toUpperCase();
        const answerIndex = /^[A-Z]$/.test(answerLetter) ? answerLetter.charCodeAt(0) - 65 : -1;
        const answerText = stripOptionPrefix(answerItem.answerText || (answerIndex >= 0 ? question.options?.[answerIndex] : "") || answerTextFromQuestion(question));
        const explanation = answerItem.explanation || question.explanation || "";
        const options = Array.isArray(question.options) ? question.options : [];

        return `
          <li class="answer-detail">
            <div class="answer-head">${index + 1}. ${escapeHtml(answerLetter || "答案")} ${answerText ? `：${escapeHtml(answerText)}` : ""} <span class="answer-note">${escapeHtml(explanation)}</span></div>
            ${options.length ? `
              <ul class="option-analysis-list">
                ${options.map((option, optionIndex) => `
                  <li>
                    <span class="option-letter">${optionLetter(optionIndex)}.</span>
                    <span>${renderMeaningOption(option, question)}</span>
                    <span class="answer-note">：${escapeHtml(meaningOptionReason(option, question, answerItem, optionIndex, answerLetter))}</span>
                  </li>
                `).join("")}
              </ul>
            ` : ""}
          </li>
        `;
      }).join("");

      return `<ol class="answer-list detailed">${items}</ol>`;
    }

    function makeApiAnswerKey(payload, options) {
      const answerMap = new Map();
      (payload.answerKey || []).forEach(section => {
        const key = section.sectionType || section.type;
        if (key) answerMap.set(key, section.items || []);
      });

      const sections = (payload.sections || []).map((section, index) => {
        if (section.type === "copyPractice") return "";
        const answers = answerMap.get(section.type);
        const items = answers && answers.length
          ? answers
          : (section.questions || []).map(question => ({
              id: question.id,
              answer: question.answer,
              answerText: answerTextFromQuestion(question),
              explanation: question.explanation
            }));

        if (section.type === "meaningSameChoice") {
          return makeSection(index + 1, section.title || apiTypeLabels[section.type] || `第 ${index + 1} 题`, renderMeaningAnswerBody(section, items));
        }

        const body = `<ol class="answer-list">${items.map(item => {
          const answer = stripOptionPrefix(item.answerText || item.answer || "");
          const prefix = item.answer && item.answerText && item.answer !== item.answerText ? `${item.answer}. ` : "";
          const note = Array.isArray(item.corrections) && item.corrections.length ? item.corrections.join("；") : (item.explanation || "");
          return `<li>${escapeHtml(prefix + answer)} <span class="answer-note">${escapeHtml(note)}</span></li>`;
        }).join("")}</ol>`;
        return makeSection(index + 1, section.title || apiTypeLabels[section.type] || `第 ${index + 1} 题`, body);
      }).filter(Boolean);

      return `
        <article class="sheet">
          <header class="worksheet-header">
            <h1 class="worksheet-title">${escapeHtml(payload.title || options.title)} 答案</h1>
            <div class="worksheet-meta">
              <span>${escapeHtml(options.dateText)}</span>
            </div>
          </header>
          ${sections.join("")}
        </article>
      `;
    }

    async function generateWithApi(rawEntries, options) {
      const wrongChars = sourceCharsFromEntries(rawEntries);
      if (!wrongChars.length) {
        throw new Error("请先输入至少一个错误单字。");
      }
      if (window.location.protocol === "file:") {
        throw new Error("API 模式需要通过 server.js 打开：在本目录运行 node server.js 后访问服务启动日志里的地址，默认是 http://127.0.0.1:8797。");
      }

      const apiConfig = ensureApiConfig();
      els.status.textContent = "正在请求大模型生成题目...";
      const response = await fetchGenerate({
        title: options.title,
        grade: options.grade,
        textbookVersion: "统编版小学语文",
        wrongChars,
        types: options.types.filter(type => apiQuestionTypes.has(type)),
        typeMultipliers: options.typeMultipliers,
        apiConfig
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(payload.error || `API 请求失败：${response.status}`);
      }

      const pages = [makeApiWorksheet(payload, options)];
      if (options.types.includes("answer")) {
        pages.push(makeApiAnswerKey(payload, options));
      }
      els.preview.innerHTML = pages.join("");
      const questionTotal = apiQuestionCount(payload);
      updateStats(wrongChars.length, questionTotal, pages.length);
      const repaired = Number(payload.repairInfo?.replaced || 0);
      const fallbackMode = payload.repairInfo?.mode === "local-material-fallback";
      els.status.textContent = fallbackMode
        ? `接口素材生成失败，已用本地保守素材生成 ${questionTotal} 道题`
        : repaired
        ? `已从 ${wrongChars.length} 个错字生成 ${questionTotal} 道 API 题，自动补题 ${repaired} 道`
        : `已从 ${wrongChars.length} 个错字生成 ${questionTotal} 道题`;
    }

    function makeWorksheet(entries, options) {
      const selected = options.types;
      const questionCount = options.coverageCount || countSourceChars(entries) || entries.length;
      let sectionNumber = 1;
      let questionTotal = 0;
      const sections = [];

      if (selected.includes("dictation")) {
        sections.push(makeSection(sectionNumber++, "听写格", makeDictation(entries, options.wordCount)));
        questionTotal += Math.min(entries.length, options.wordCount);
      }

      if (selected.includes("copy")) {
        const rows = makeCopyTable(entries, Math.min(questionCount, entries.length));
        sections.push(makeSection(sectionNumber++, "规范书写", rows));
        questionTotal += Math.min(questionCount, entries.length);
      }

      if (selected.includes("pinyin")) {
        const body = makePinyin(entries, questionCount);
        if (body) {
          sections.push(makeSection(sectionNumber++, "看拼音写词语", `<div class="question-grid">${body}</div>`));
          questionTotal += Math.min(entries.filter(entry => entry.pinyin).length, questionCount);
        }
      }

      if (selected.includes("fill")) {
        const fill = makeFillQuestions(entries, questionCount);
        if (fill.length) {
          const bank = Array.from(new Set(fill.flatMap(item => item.choices)));
          const body = `
            <div class="word-bank">${bank.map(word => `<span class="pill">${escapeHtml(word)}</span>`).join("")}</div>
            <div class="question-grid">
              ${fill.map((item, index) => `
                <div class="question full">${index + 1}. ${escapeHtml(item.prompt)}</div>
              `).join("")}
            </div>
          `;
          sections.push(makeSection(sectionNumber++, "选词填空", body));
          questionTotal += fill.length;
        }
      }

      if (selected.includes("discriminate")) {
        const questions = makeDiscriminationQuestions(entries, questionCount);
        if (questions.length) {
          const body = `<div class="question-grid">
            ${questions.map((item, index) => `
              <div class="question full">
                ${index + 1}. ${escapeHtml(item.text)}
                ${choiceLine(item.words)}
              </div>
            `).join("")}
          </div>`;
          sections.push(makeSection(sectionNumber++, "词语辨析", body));
          questionTotal += questions.length;
        }
      }

      if (selected.includes("typo")) {
        const questions = makeTypoQuestions(entries, questionCount);
        if (questions.length) {
          const body = `<div class="question-grid">
            ${questions.map((item, index) => `
              <div class="question full">${index + 1}. ${escapeHtml(item.wrong)}<br>改为：<span class="line-answer"></span></div>
            `).join("")}
          </div>`;
          sections.push(makeSection(sectionNumber++, "改错题", body));
          questionTotal += questions.length;
        }
      }

      if (selected.includes("sentence")) {
        const body = makeSentenceQuestions(entries, questionCount);
        sections.push(makeSection(sectionNumber++, "造句应用", `<div class="question-grid">${body}</div>`));
        questionTotal += Math.min(questionCount, entries.length);
      }

      const sheet = `
        <article class="sheet">
          <header class="worksheet-header">
            <h1 class="worksheet-title">${escapeHtml(options.title)}</h1>
            <div class="worksheet-meta">
              <span>${escapeHtml(options.grade)}</span>
              <span class="meta-line">姓名</span>
              <span class="meta-line">日期</span>
              <span class="meta-line">用时</span>
            </div>
          </header>
          ${sections.join("")}
        </article>
      `;

      return { sheet, questionTotal };
    }

    function makeAnswerKey(entries, options) {
      const selected = options.types;
      const questionCount = options.coverageCount || countSourceChars(entries) || entries.length;
      let sectionNumber = 1;
      const sections = [];

      if (selected.includes("dictation")) {
        const words = entries.slice(0, options.wordCount).map(entry => entry.term);
        sections.push(makeSection(sectionNumber++, "听写词语", `<ol class="answer-list">${words.map(word => `<li>${escapeHtml(word)}</li>`).join("")}</ol>`));
      }

      if (selected.includes("pinyin")) {
        const usable = entries.filter(entry => entry.pinyin).slice(0, questionCount);
        if (usable.length) {
          sections.push(makeSection(sectionNumber++, "看拼音写词语", `<ol class="answer-list">${usable.map(entry => `<li>${escapeHtml(entry.pinyin)}：${escapeHtml(entry.term)}</li>`).join("")}</ol>`));
        }
      }

      if (selected.includes("fill")) {
        const fill = makeFillQuestions(entries, questionCount);
        if (fill.length) {
          sections.push(makeSection(sectionNumber++, "选词填空", `<ol class="answer-list">${fill.map(item => `<li>${escapeHtml(item.answer)}</li>`).join("")}</ol>`));
        }
      }

      if (selected.includes("discriminate")) {
        const questions = makeDiscriminationQuestions(entries, questionCount);
        if (questions.length) {
          sections.push(makeSection(sectionNumber++, "词语辨析", `<ol class="answer-list">${questions.map(item => `<li>${escapeHtml(item.answer)} <span class="answer-note">${escapeHtml(item.reason || "")}</span></li>`).join("")}</ol>`));
        }
      }

      if (selected.includes("typo")) {
        const questions = makeTypoQuestions(entries, questionCount);
        if (questions.length) {
          sections.push(makeSection(sectionNumber++, "改错题", `<ol class="answer-list">${questions.map(item => `<li>${escapeHtml(item.answer)}</li>`).join("")}</ol>`));
        }
      }

      if (selected.includes("sentence")) {
        sections.push(makeSection(sectionNumber++, "造句应用", `<p class="answer-note">检查句子是否完整、通顺，是否正确使用目标词语；高层级训练可增加细节、动作或心情描写。</p>`));
      }

      return `
        <article class="sheet">
          <header class="worksheet-header">
            <h1 class="worksheet-title">${escapeHtml(options.title)} 答案</h1>
            <div class="worksheet-meta">
              <span>${escapeHtml(options.dateText)}</span>
            </div>
          </header>
          ${sections.join("")}
        </article>
      `;
    }

    function collectOptions() {
      const dateText = syncTodayDate();
      return {
        grade: els.grade.value,
        title: els.title.value.trim() || "字词练习",
        types: getSelectedTypes(),
        typeMultipliers: getTypeMultipliers(),
        wordCount: Number(els.wordCount.value) || 12,
        dateText
      };
    }

    async function generate() {
      const rawEntries = parseInput(els.input.value);
      const entries = expandInputEntries(rawEntries);
      const options = collectOptions();

      if (!rawEntries.length) {
        els.preview.innerHTML = `<div class="empty-state">输入错误单字后生成练习页</div>`;
        updateStats(0, 0, 0);
        els.status.textContent = "等待生成";
        saveState();
        return;
      }

      if (els.useApi.checked) {
        try {
          await generateWithApi(rawEntries, options);
        } catch (error) {
          els.preview.innerHTML = `<div class="empty-state">${escapeHtml(error.message || "API 生成失败")}</div>`;
          updateStats(sourceCharsFromEntries(rawEntries).length, 0, 0);
          els.status.textContent = "API 生成失败";
        }
        saveState();
        return;
      }

      const localOptions = {
        ...options,
        coverageCount: countSourceChars(rawEntries),
        types: ["dictation", "copy", "pinyin", "fill", "discriminate", "typo", "sentence", ...(options.types.includes("answer") ? ["answer"] : [])]
      };
      const selectedEntries = selectPracticeEntries(entries, options.wordCount);
      const { sheet, questionTotal } = makeWorksheet(selectedEntries, localOptions);
      const pages = [sheet];
      if (options.types.includes("answer")) {
        pages.push(makeAnswerKey(selectedEntries, localOptions));
      }

      els.preview.innerHTML = pages.join("");
      updateStats(entries.length, questionTotal, pages.length);
      els.status.textContent = `本地兜底：已从 ${countSourceChars(rawEntries)} 个错字生成 ${questionTotal} 道题`;
      saveState();
    }

    function updateStats(words, questions, pages) {
      els.statWords.textContent = words;
      els.statQuestions.textContent = questions;
      els.statPages.textContent = pages;
    }

    function saveState() {
      const date = syncTodayDate();
      const data = {
        grade: els.grade.value,
        title: els.title.value,
        input: els.input.value,
        wordCount: els.wordCount.value,
        date,
        useApi: els.useApi.checked,
        types: getSelectedTypes(),
        typeMultipliers: getTypeMultipliers()
      };
      localStorage.setItem(stateKey, JSON.stringify(data));
    }

    function restoreState() {
      syncTodayDate();
      const saved = localStorage.getItem(stateKey);
      if (!saved) {
        els.input.value = sampleText;
        return;
      }

      try {
        const data = JSON.parse(saved);
        els.grade.value = data.grade || els.grade.value;
        els.title.value = data.title || els.title.value;
        els.input.value = data.input || sampleText;
        els.wordCount.value = data.wordCount || els.wordCount.value;
        syncTodayDate();
        els.useApi.checked = data.useApi !== false;
        if (Array.isArray(data.types)) {
          const restoredTypes = new Set(data.types);
          restoredTypes.add("copyPractice");
          els.checks.querySelectorAll("input").forEach(input => {
            input.checked = restoredTypes.has(input.value);
          });
        }
        applyTypeMultipliers(data.typeMultipliers || {});
        updateTypeMultiplierStates();
      } catch {
        els.input.value = sampleText;
      }
    }

    els.generate.addEventListener("click", () => {
      generate();
    });
    els.print.addEventListener("click", async () => {
      await generate();
      window.print();
    });
    els.sample.addEventListener("click", () => {
      els.input.value = sampleText;
      saveState();
      els.status.textContent = "示例已填入，点击生成练习开始。";
    });
    els.clear.addEventListener("click", () => {
      els.input.value = "";
      saveState();
      els.preview.innerHTML = `<div class="empty-state">输入错误单字后生成练习页</div>`;
      updateStats(0, 0, 0);
      els.status.textContent = "已清空";
    });
    els.toggleConfig.addEventListener("click", () => {
      els.apiConfigPanel.classList.toggle("open");
    });
    els.saveConfig.addEventListener("click", () => {
      saveApiConfig();
    });
    els.clearConfig.addEventListener("click", () => {
      clearApiConfig();
    });
    els.apiProvider.addEventListener("change", () => {
      applyProviderPreset(true);
      setConfigStatus("已切换接口预设，请检查 API Key 后保存。", "warn");
    });

    [els.grade, els.title, els.input, els.wordCount, els.date, els.useApi].forEach(el => {
      el.addEventListener("change", () => {
        updateGenerationModeUI();
        saveState();
      });
    });
    els.checks.querySelectorAll(".type-multiplier").forEach(select => {
      select.addEventListener("click", event => event.stopPropagation());
    });
    els.checks.addEventListener("change", () => {
      updateTypeMultiplierStates();
      saveState();
    });

    restoreState();
    updateTypeMultiplierStates();
    updateGenerationModeUI();
    setInterval(() => {
      const previousDate = els.date.value;
      const currentDate = syncTodayDate();
      if (previousDate !== currentDate) {
        saveState();
      }
    }, 60 * 1000);
    const loadedConfig = loadApiConfig();
    if (els.useApi.checked && !loadedConfig) {
      els.apiConfigPanel.classList.add("open");
      els.preview.innerHTML = `<div class="empty-state">保存 API 配置后点击生成练习</div>`;
      els.status.textContent = "请先保存 API 配置";
    } else {
      els.status.textContent = "配置已加载，点击生成练习开始。";
    }
  </script>
</body>
</html>
